site_name: 🇨🇳 ERPNext 中国本土化配置包
site_description: 记录我们在探索和试用 ERPNext 过程中的一份实战踩坑记录与配置分享
site_author: Qingpi Tech
repo_url: https://github.com/kingpy-tech/erpnext_china_opc

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到亮色模式

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - 首页: index.md
  - 为什么要参与贡献: WHY_CONTRIBUTE.md
  - 实施踩坑与配置指南:
    - 目录索引: erpnext/index.md
    - 5 分钟快速启动: erpnext/00_Quick_Start.md
    - 00 1Panel 前置准备: erpnext/00_ERPNext_Preparation_1Panel.md
    - 01 基础安装与多租户隔离: erpnext/01_ERPNext_Micro_Server_Install.md
    - 02 沙盒实验室与快照回退: erpnext/02_Advanced_Backup_Restore_Tenant.md
    - 03 高新企业科目表导入: erpnext/03_Chart_of_Accounts_Import.md
    - 04 自定义翻译补全指南: erpnext/04_Custom_Translation_Import.md
    - 05 优雅参与开源社区: erpnext/05_OpenSource_Contribution_and_Fork.md
    - 06 工作区简化与权限配置: erpnext/06_Workspace_Simplification.md
    - 07 ERPNext v16 升级指南: erpnext/07_ERPNext_v16_Upgrade.md
    - 08 中国本土化深度指南: erpnext/08_China_Localization_Deep_Dive.md
    - 09 金税系统对接技术指南: erpnext/09_Golden_Tax_Integration.md
    - 10 微信生态集成指南: erpnext/10_WeChat_Integration.md
    - 11 性能优化实战指南: erpnext/11_Performance_Optimization.md
    - 12 备份与灾难恢复指南: erpnext/12_Backup_and_Recovery.md
    - 13 多公司与多站点管理: erpnext/13_Multi_Company_Setup.md
    - 14 自定义开发入门: erpnext/14_Custom_Development.md
    - 15 工作流与审批配置: erpnext/15_Workflow_and_Approval.md
    - 16 报表与数据分析: erpnext/16_Reports_and_Analytics.md
    - 17 安全加固实战指南: erpnext/17_Security_Hardening.md
    - 常见问题 FAQ: FAQ.md
  - 项目状态: PROJECT_STATUS.md
  - 部署检查清单: DEPLOY_CHECKLIST.md
  - 联系我们: contact.md
  - 开源折腾笔记: projects.md
