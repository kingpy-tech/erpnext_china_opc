name: Sync Docs to COS and GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/sync_docs.yml'

jobs:
  build-and-deploy:
    name: 构建并部署文档到 COS 和 GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: 获取最新代码
        uses: actions/checkout@v3

      - name: 配置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: 安装依赖 (MkDocs & coscmd)
        run: |
          pip install mkdocs-material
          pip install coscmd

      - name: 编译静态网站
        run: mkdocs build

      - name: 上传到腾讯云 COS (国内版 qingpy.cn)
        env:
          COS_SECRET_ID: ${{ secrets.TENCENT_COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.TENCENT_COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.TENCENT_COS_BUCKET }}
          COS_REGION: ${{ secrets.TENCENT_COS_REGION }}
        run: |
          # 1. 初始化 COS 认证信息
          coscmd config -a $COS_SECRET_ID -s $COS_SECRET_KEY -b $COS_BUCKET -r $COS_REGION
          # 2. 将编译后的 site 目录的文件同步到 COS
          coscmd upload -rs --delete ./site /

      - name: 部署到 GitHub Pages (海外版 kingpy.com)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
