name: Sync Docs to COS and GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/sync_docs.yml'

# GitHub Pages 官方部署需要的权限配置
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: 构建并部署文档
    runs-on: ubuntu-latest
    # 增加环境变量配置，这是官方 GitHub Pages 部署要求的
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 获取最新代码
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: 安装依赖 (MkDocs & coscmd)
        run: |
          pip install mkdocs-material
          pip install coscmd

      - name: 编译静态网站
        run: mkdocs build

      - name: 上传到腾讯云 COS (国内版 qingpy.cn)
        env:
          COS_SECRET_ID: ${{ secrets.TENCENT_COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.TENCENT_COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.TENCENT_COS_BUCKET }}
          COS_REGION: ${{ secrets.TENCENT_COS_REGION }}
        run: |
          if [ -z "$COS_SECRET_ID" ] || [ -z "$COS_SECRET_KEY" ]; then
            echo "⚠️ 警告: 缺少 COS 密钥，跳过腾讯云 COS 上传步骤。请确保在 Secrets 中正确配置了 TENCENT_COS_SECRET_ID 等 4 个变量。"
          else
            # 1. 初始化 COS 认证信息
            coscmd config -a "$COS_SECRET_ID" -s "$COS_SECRET_KEY" -b "$COS_BUCKET" -r "$COS_REGION"
            # 2. 将编译后的 site 目录的文件同步到 COS
            coscmd upload -rs --delete ./site /
            echo "✅ 成功上传到腾讯云 COS"
          fi

      - name: 设置 GitHub Pages
        uses: actions/configure-pages@v4

      - name: 上传静态文件到 Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
